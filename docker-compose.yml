services:
  api:
    build: .
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    command: ['npx', 'ts-node', '--watch', 'src/main.ts']
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: pingranger
      POSTGRES_USER: pingranger
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - ./postgres:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pingranger']
      interval: 5s
      timeout: 5s
      retries: 5
